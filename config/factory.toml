[workspace]
name = "ai-lab"
runs_dir = "factory/runs"
products_dir = "products"
prompts_dir = "factory/prompts"
agents_dir = "factory/agents"

[runtime]
worker_runtime = "tool-agent"
langgraph_enabled = false
tool_trace_enabled = true

[orchestrator]
provider = "codex"
command = "codex"
model = "gpt-5.4"
sandbox = "workspace-write"
approval_policy = "on-request"
full_auto = true
role_file = "factory/agents/orchestrator.md"

[tools.brave_search]
enabled = true
endpoint = "https://api.search.brave.com/res/v1/web/search"
api_key_env = "BRAVE_SEARCH_API_KEY"
count = 5
country = "BR"
search_lang = "pt"
ui_lang = "pt-BR"

[tools.fetch]
enabled = true
timeout_seconds = 20
max_chars = 6000
max_pages = 3
user_agent = "ai-lab/0.2"

[tools.repo]
enabled = true
max_files = 200
max_matches = 50

[tools.browser]
specialist = "codex"
playwright_mcp_enabled = false

[workers.research]
provider = "ollama"
command = "ollama"
model = "qwen2.5:7b"
role_file = "factory/agents/research.md"
runtime = "tool-agent"
tools = ["brave_search", "fetch"]

[workers.analyst]
provider = "ollama"
command = "ollama"
model = "llama3:8b"
role_file = "factory/agents/analyst.md"
runtime = "tool-agent"
tools = ["brave_search", "fetch"]

[workers.dev]
provider = "ollama"
command = "ollama"
model = "deepseek-coder:6.7b"
role_file = "factory/agents/dev.md"
runtime = "tool-agent"
tools = ["repo_snapshot", "repo_search", "git_status"]

[workers.marketing]
provider = "ollama"
command = "ollama"
model = "phi3:mini"
role_file = "factory/agents/marketing.md"
runtime = "tool-agent"
tools = ["brave_search", "fetch", "repo_snapshot"]

[[pipeline.steps]]
name = "scan"
executor = "research"
prompt = "scan.md"
output = "01-scan.md"
gate = ""

[[pipeline.steps]]
name = "score"
executor = "orchestrator"
prompt = "score.md"
output = "02-score.md"
gate = "idea"

[[pipeline.steps]]
name = "spec"
executor = "orchestrator"
prompt = "spec.md"
output = "03-spec.md"
gate = "mvp"

[[pipeline.steps]]
name = "build"
executor = "dev"
prompt = "build.md"
output = "04-build.md"
gate = "build"

[[pipeline.steps]]
name = "marketing"
executor = "marketing"
prompt = "marketing.md"
output = "05-marketing.md"
gate = ""
